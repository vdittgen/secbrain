name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python — lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          . .venv/bin/activate
          ruff check src/ tests/

      - name: Pytest
        run: |
          . .venv/bin/activate
          python -m pytest tests/ -q --tb=short

  typescript:
    name: TypeScript — type check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  rust:
    name: Rust — clippy & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libssl-dev \
            pkg-config

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      # The Tauri build script validates bundle resource paths declared
      # in tauri.conf.json. python_runtime is fetched only for release
      # bundling; create an empty placeholder so clippy/test can run.
      # frontendDist ("../dist") must also exist.
      - name: Stub bundle resources
        run: |
          mkdir -p python_runtime/python dist
          touch dist/index.html

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test --all
