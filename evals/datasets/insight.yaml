# Insight-author eval suite.
#
# Inputs are assembled context prompts the legacy InsightGenerator
# would normally hand to the agent. We check title shape (short,
# headline-style), content presence, and grade the prose for
# specificity + groundedness via the LLM judge.
#
# sensitivity_tier: N/A

cases:
  - name: pending_replies_prompt
    inputs: |
      Surface pending replies from the last 7 days.
      Context: Alice (asked Tue about deadline), Bob (asked Wed about
      lunch), Carol (asked today about the contract).
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: title}}
      - {FieldNotEmpty: {field: content}}
      - LLMJudgeOnField:
          field: content
          threshold: 7
          rubric: >
            The content must reference Alice's deadline, Bob's lunch,
            or Carol's contract — at least one specific item from the
            context. Generic "you have pending replies" without
            specifics scores 0-3. Fabricating extra names scores 0.
            Score 7+ when at least two named items appear and no
            extras are invented.
      - LLMJudgeOnField:
          field: title
          threshold: 6
          rubric: >
            Headline-style, ≤ 8 words, no trailing punctuation. No
            generic platitudes ("Stay productive", "Check your
            messages"). Score 7+ when title hints at the specific
            content (replies, contracts, deadlines).

  - name: weekly_summary_prompt
    inputs: |
      Surface the week's most important developments.
      Context: shipped a release on Tuesday, signed the Acme contract
      Thursday, ran 30k total miles.
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: content}}
      - LLMJudgeOnField:
          field: content
          threshold: 7
          rubric: >
            The content must mention at least two of: the release,
            the Acme contract, the 30k miles. Inventing other
            developments scores 0-3. Generic motivational prose
            scores 0-3. Score 7+ when grounded in two or more given
            facts.

  - name: health_pattern_prompt
    inputs: |
      Surface a health pattern from the last month.
      Context: heart rate variability dropped 15% week-over-week,
      sleep averaged 5.8h, late-night workouts increased.
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: content}}
      - LLMJudgeOnField:
          field: content
          threshold: 7
          rubric: >
            Must reference the HRV drop and the short sleep average.
            Connecting them to late-night workouts is a bonus.
            Fabricated medical numbers (resting heart rate, recovery
            scores not in the input) score 0-2. Score 7+ when at
            least two given metrics appear and no clinical advice is
            invented.

  - name: empty_context_no_fabrication
    inputs: |
      Surface anything notable.
      Context: (no significant signals this week).
    expected_output: null
    evaluators:
      - LLMJudgeOnField:
          field: content
          threshold: 7
          rubric: >
            With nothing notable to surface the agent must either
            return an honest "no significant signals" or skip the
            insight entirely. Inventing fake updates scores 0.
            Score 7+ when the response acknowledges the empty context.

  - name: relationship_nudge_prompt
    inputs: |
      Surface a relationship pattern.
      Context: Last contact with Garopaba-friend Tuca was 8 weeks
      ago. Last shared topic: planning a trip to Garopaba in March.
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: title}}
      - LLMJudgeOnField:
          field: content
          threshold: 7
          rubric: >
            Must mention Tuca by name and reference the 8-week gap
            or the Garopaba trip topic. Score 7+ when both facts
            appear; 4-6 when only one appears; 0-3 when neither does
            or another name/topic is invented.

evaluators: []
