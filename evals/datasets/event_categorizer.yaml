# Event-categorizer eval suite.
#
# Each case feeds one calendar event (title + optional context) and
# asserts the agent picks the right bucket from the closed vocabulary
# {meeting, social, health, travel, other}.
#
# These are the cases that motivated the rebuild: the legacy
# keyword-based CASE in int_events_enriched.sql labelled almost every
# real-world event as "other" because it only matched a handful of
# title fragments. The cases below pull from the user's own calendar
# (titles like "Product x UX Sync", "Refinement", "Garett Blocked")
# alongside generic synthetic events to keep the suite broad.
#
# Requires a real LLM; runs through EventCategorizerAgent.categorize().
#
# sensitivity_tier: 2 (event titles can be tier 2)

cases:
  # --- meeting (work) --------------------------------------------------
  - name: product_ux_sync
    inputs:
      title: "Product x UX Sync"
      description: ""
    expected_output:
      category: meeting
    evaluators:
      - {FieldEquals: {field: category, value: meeting}}

  - name: backlog_refinement
