# Weekly-digest eval suite.
#
# The agent produces a DigestSummary with four prose sections:
# highlight, communication, schedule, notes. Structural checks
# confirm relevant sections are populated; LLM judge grades
# groundedness in the input rollup.
#
# sensitivity_tier: N/A

cases:
  - name: full_week
    inputs: |
      Messages (42 total):
        - Sam: contract signed Tue
        - Alice: lunch Thursday confirmed
        - Mom: dad starts treatment Monday
      Events (7 total):
        - Board review Wed 10am
        - Doctor appointment Fri 2pm
      Notes (3 total):
        - Garopaba renovation budget
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: highlight}}
      - {FieldNotEmpty: {field: communication}}
      - {FieldNotEmpty: {field: schedule}}
      - {FieldNotEmpty: {field: notes}}
      - LLMJudgeOnField:
          field: communication
          threshold: 7
          rubric: >
            Communication section must reference at least two of:
            Sam contract, Alice lunch, Mom treatment. Inventing
            other senders or messages scores 0-3.
      - LLMJudgeOnField:
          field: schedule
          threshold: 7
          rubric: >
            Schedule section must mention both the board review
            and the doctor appointment. Fabricated meetings score
            0-3.
      - LLMJudgeOnField:
          field: highlight
          threshold: 6
          rubric: >
            One short headline that captures THE most consequential
            item of the week (treatment start, contract, or board
            review). Generic "busy week" scores 0-3.

  - name: sparse_week
    inputs: |
      Messages (2 total):
        - Bob: hey
      Events (0 total)
      Notes (0 total)
    expected_output: null
    evaluators:
      - {FieldEquals: {field: schedule, value: ""}}
      - {FieldEquals: {field: notes, value: ""}}
      - LLMJudgeOnField:
          field: highlight
          threshold: 6
          rubric: >
            With nothing to highlight the agent should leave it
            blank or write a single honest sentence acknowledging
            the quiet week. Fabricated events score 0.

  - name: health_dominated_week
    inputs: |
      Messages (12 total):
        - Mom: dad's scan was clear, finally
        - Brother: visiting Mom and Dad this weekend
      Events (2 total):
        - Mom and Dad — Sunday dinner
      Notes (0 total)
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: highlight}}
      - LLMJudgeOnField:
          field: highlight
          threshold: 7
          rubric: >
            The clear scan is the obvious headline. Anything else
            scores 4 or less. Fabricated treatment details score 0.

  - name: work_focused_week
    inputs: |
      Messages (8 total):
        - Boss: Acme contract closes Friday
        - Boss: Q3 OKRs draft please
      Events (3 total):
        - All-hands Tue 9am
        - Acme signing Fri 3pm
      Notes (1 total):
        - Acme renewal terms
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: communication}}
      - {FieldNotEmpty: {field: schedule}}
      - LLMJudgeOnField:
          field: highlight
          threshold: 7
          rubric: >
            Must reference the Acme contract or signing. Generic
            "productive work week" scores 0-3.

  - name: travel_week
    inputs: |
      Messages (3 total)
      Events (4 total):
        - Flight LIS → GRU Mon
        - Hotel check-in Mon
        - Meeting in São Paulo Tue
        - Flight GRU → LIS Fri
      Notes (1 total):
        - Brazil trip itinerary
    expected_output: null
    evaluators:
      - {FieldNotEmpty: {field: schedule}}
      - LLMJudgeOnField:
          field: schedule
          threshold: 7
          rubric: >
            Schedule section must mention the LIS/GRU flights or
            São Paulo trip. Fabricated cities score 0.

evaluators: []
