id: weekly-digest
name: Weekly Digest
version: "1.0.0"
description: Generates a weekly summary of messages, events, and notes
author: Arandu
builtin: true
category: productivity
max_sensitivity_tier: 2
can_use_llm: true
tables:
  - table: raw_messages
    max_tier: 2
  - table: raw_calendar_events
    max_tier: 2
  - table: raw_notes
    max_tier: 1
write_tables:
  - ext_weekly_digest_summaries
triggers:
  - scheduled
  - manual
schedule: "0 9 * * 1"
skills:
  - summarize-text
memory_mb: 256
timeout_seconds: 120
